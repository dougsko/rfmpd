syntax = "proto3";
package rfmp;
option go_package = "github.com/dprostko/rfmp-go/internal/protocol/pb";

message Frame {
  oneof payload {
    Msg msg = 1;
    Frag frag = 2;
    Svec svec = 3;
  }
}

message Msg {
  bytes id = 1;
  string from_node = 2;
  uint32 timestamp = 3;
  string channel = 4;
  bytes reply_to = 5;
  string body = 6;
  uint32 seq = 7;
  string author = 8;
}

message Frag {
  bytes msg_id = 1;
  uint32 idx = 2;
  uint32 total = 3;
  bytes data = 4;
}

message Svec {
  string from_node = 1;
  map<string, uint32> vector = 2;
}
