# RFMP Radio Device Rules for mdev (Alpine Linux)
# Starts Direwolf when radio hardware is plugged in.
#
# Note: mdev cannot filter by USB vendor/product ID. The ttyUSB rule
# will trigger for ANY USB serial adapter, not just the Digirig.
# For precise matching, use udev (Debian/Fedora) instead.

# Digirig (CP210x) — VHF
ttyUSB[0-9]* root:dialout 660 @rc-service direwolf.digirig start

# Digirig Lite (C-Media CM108) — VHF
hidraw[0-9]* root:plugdev 660 @rc-service direwolf.digiriglite start

# QMX (STM32 VCP) — HF
ttyACM[0-9]* root:dialout 660 @rc-service direwolf.qmx start
